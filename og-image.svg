<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="r1" cx="15%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#040e16" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="r2" cx="85%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#040e16" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#00c8ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#040e16"/>
  <rect width="1200" height="630" fill="url(#r1)"/>
  <rect width="1200" height="630" fill="url(#r2)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#barGrad)"/>

  <!-- Border -->
  <rect x="1" y="4" width="1198" height="625" fill="none" stroke="rgba(100,220,255,0.12)" stroke-width="1"/>

  <!-- Left content -->
  <!-- "Available for work" badge -->
  <rect x="80" y="130" width="228" height="36" rx="18" fill="rgba(0,200,255,0.08)" stroke="rgba(100,220,255,0.3)" stroke-width="1"/>
  <circle cx="108" cy="148" r="5" fill="#00e5ff"/>
  <text x="124" y="153" font-family="'Courier New', monospace" font-size="14" fill="#7adfff" letter-spacing="0.3">Available for work</text>

  <!-- Greeting -->
  <text x="80" y="260" font-family="'Courier New', monospace" font-size="54" font-weight="700" fill="#e6f7ff" letter-spacing="-1">Hi, I'm</text>

  <!-- Name with gradient -->
  <text x="80" y="360" font-family="'Courier New', monospace" font-size="88" font-weight="700" fill="url(#nameGrad)" letter-spacing="-2">Yaroslav</text>

  <!-- Title -->
  <text x="80" y="435" font-family="'Courier New', monospace" font-size="36" font-weight="600" fill="rgba(230,247,255,0.75)" letter-spacing="0.5">Full-Stack Developer</text>

  <!-- Tech tags -->
  <rect x="80"  y="470" width="108" height="28" rx="6" fill="rgba(0,200,255,0.07)" stroke="rgba(0,200,255,0.25)" stroke-width="1"/>
  <text x="134" y="489" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#7adfff">Python</text>

  <rect x="200" y="470" width="136" height="28" rx="6" fill="rgba(0,200,255,0.07)" stroke="rgba(0,200,255,0.25)" stroke-width="1"/>
  <text x="268" y="489" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#7adfff">JavaScript</text>

  <rect x="348" y="470" width="110" height="28" rx="6" fill="rgba(0,200,255,0.07)" stroke="rgba(0,200,255,0.25)" stroke-width="1"/>
  <text x="403" y="489" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#7adfff">FastAPI</text>

  <rect x="470" y="470" width="100" height="28" rx="6" fill="rgba(0,200,255,0.07)" stroke="rgba(0,200,255,0.25)" stroke-width="1"/>
  <text x="520" y="489" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#7adfff">Docker</text>

  <!-- Divider line -->
  <line x1="80" y1="530" x2="580" y2="530" stroke="rgba(100,220,255,0.12)" stroke-width="1"/>

  <!-- URL -->
  <text x="80" y="570" font-family="'Courier New', monospace" font-size="18" fill="rgba(0,200,255,0.45)" letter-spacing="0.5">fan-world-me.github.io</text>

  <!-- Right decoration — code brackets -->
  <text x="750" y="420" font-family="'Courier New', monospace" font-size="260" font-weight="700" fill="rgba(0,200,255,0.03)">{}</text>

  <!-- Right side stats -->
  <rect x="900" y="140" width="220" height="90" rx="12" fill="rgba(8,24,40,0.6)" stroke="rgba(100,220,255,0.15)" stroke-width="1"/>
  <text x="1010" y="178" text-anchor="middle" font-family="'Courier New', monospace" font-size="36" font-weight="700" fill="url(#nameGrad)">10+</text>
  <text x="1010" y="212" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="rgba(159,232,255,0.7)">Languages &amp; Frameworks</text>

  <rect x="900" y="250" width="220" height="90" rx="12" fill="rgba(8,24,40,0.6)" stroke="rgba(100,220,255,0.15)" stroke-width="1"/>
  <text x="1010" y="288" text-anchor="middle" font-family="'Courier New', monospace" font-size="36" font-weight="700" fill="url(#nameGrad)">Full</text>
  <text x="1010" y="322" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="rgba(159,232,255,0.7)">Stack Developer</text>

  <rect x="900" y="360" width="220" height="90" rx="12" fill="rgba(8,24,40,0.6)" stroke="rgba(100,220,255,0.15)" stroke-width="1"/>
  <text x="1010" y="398" text-anchor="middle" font-family="'Courier New', monospace" font-size="36" font-weight="700" fill="url(#nameGrad)">DB</text>
  <text x="1010" y="432" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="rgba(159,232,255,0.7)">PostgreSQL &amp; SQL</text>
</svg>
