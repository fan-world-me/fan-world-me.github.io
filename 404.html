<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Yaroslav</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Monocraft';
      src: url('Monocraft.ttc') format('truetype');
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0f;
      color: #e6f7ff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 80%, rgba(6,182,212,0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
      animation: rotate 20s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }

    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(-2px, -2px); }
      60% { transform: translate(2px, 2px); }
      80% { transform: translate(2px, -2px); }
      100% { transform: translate(0); }
    }

    @keyframes neonGlow {
      0%, 100% {
        text-shadow: 0 0 10px rgba(0, 200, 255, 0.5),
                     0 0 20px rgba(0, 200, 255, 0.3),
                     0 0 30px rgba(0, 200, 255, 0.2);
      }
      50% {
        text-shadow: 0 0 20px rgba(0, 200, 255, 0.8),
                     0 0 30px rgba(0, 200, 255, 0.5),
                     0 0 40px rgba(0, 200, 255, 0.3);
      }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px;
      max-width: 600px;
    }

    .error-code {
      font-family: 'Monocraft', 'Fira Code', monospace;
      font-size: clamp(80px, 15vw, 180px);
      font-weight: 700;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite, neonGlow 2s ease-in-out infinite;
      line-height: 1;
    }

    .glitch {
      position: relative;
      display: inline-block;
    }

    .glitch::before,
    .glitch::after {
      content: '404';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .glitch::before {
      animation: glitch 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
      color: #00c8ff;
      z-index: -1;
    }

    .glitch::after {
      animation: glitch 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) reverse infinite;
      color: #7c3aed;
      z-index: -2;
    }

    h1 {
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 600;
      margin-bottom: 16px;
      color: #e6f7ff;
    }

    p {
      font-size: 18px;
      color: #9fe8ff;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .code-block {
      background: rgba(6, 20, 36, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(100, 220, 255, 0.18);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 40px;
      text-align: left;
      font-family: 'Monocraft', 'Fira Code', monospace;
      font-size: 14px;
      color: #89cfe6;
      overflow-x: auto;
    }

    .code-block span {
      color: #00c8ff;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: #7c3aed;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    .btn:hover {
      background: #6d28d9;
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(124, 58, 237, 0.4);
    }

    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #00c8ff;
      border-radius: 50%;
      opacity: 0.3;
      animation: particleFloat 10s infinite;
    }

    @keyframes particleFloat {
      0% {
        transform: translateY(100vh) translateX(0);
        opacity: 0;
      }
      10% {
        opacity: 0.3;
      }
      90% {
        opacity: 0.3;
      }
      100% {
        transform: translateY(-100vh) translateX(100px);
        opacity: 0;
      }
    }

    @media (max-width: 768px) {
      .container {
        padding: 24px;
      }

      .error-code {
        font-size: 100px;
      }

      h1 {
        font-size: 24px;
      }

      p {
        font-size: 16px;
      }

      .code-block {
        font-size: 12px;
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <div class="container">
    <div class="error-code glitch">404</div>
    <h1>Page Not Found</h1>
    <p>Looks like you've ventured into uncharted territory. The page you're looking for doesn't exist or has been moved.</p>

    <div class="code-block">
      <span>Error:</span> ENOENT: no such file or directory<br>
      <span>Path:</span> '<span id="current-path"></span>'<br>
      <span>Status:</span> 404 Not Found
    </div>

    <a href="/" class="btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Back to Home
    </a>
  </div>

  <script>
    // Display current path
    document.getElementById('current-path').textContent = window.location.pathname;

    // Generate floating particles
    const particlesContainer = document.getElementById('particles');
    const particleCount = 30;

    for (let i = 0; i < particleCount; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 10 + 's';
      particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
      particlesContainer.appendChild(particle);
    }

    // Redirect to home after 10 seconds (optional)
    // setTimeout(() => {
    //   window.location.href = '/';
    // }, 10000);
  </script>
</body>
</html>
